<svg
  width="578"
  height="130"
  viewBox="0 0 578 130"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="Human verification widget animation"
>
  <defs>
    <linearGradient id="label-fade-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="14%" stop-color="white" stop-opacity="1"/>
      <stop offset="86%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="black" stop-opacity="0"/>
    </linearGradient>

    <mask id="label-mask" maskUnits="userSpaceOnUse">
      <rect x="108" y="12" width="350" height="96" fill="url(#label-fade-grad)"/>
    </mask>
  </defs>

  <style>
    .ui-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      fill: #000;
      text-rendering: geometricPrecision;
    }

    .label {
      font-size: 34.2857px;
      font-weight: 500;
      letter-spacing: 0.025em;
    }

    .brand {
      font-size: 26.8489px;
      font-weight: 400;
      letter-spacing: 0.03em;
      fill: #212121;
    }

    .widget-scale {
      transform-box: fill-box;
      transform-origin: center;
      animation: widget-scale 15s infinite;
      animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
    }

    .idle-box {
      animation: idle-box-opacity 15s linear infinite;
    }

    .verifying-ring {
      animation: verifying-ring-opacity 15s linear infinite;
    }

    .ring-progress {
      animation: ring-progress 15s infinite;
      animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
    }

    .final-check {
      animation: final-check-opacity 15s linear infinite;
    }

    .final-check path {
      animation: check-draw 15s infinite;
      animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
    }

    .label-initial,
    .label-verifying,
    .label-solved {
      animation-duration: 15s;
      animation-iteration-count: infinite;
      animation-timing-function: cubic-bezier(0.25, 1, 0.35, 1);
    }

    .label-initial { animation-name: label-initial; }
    .label-verifying { animation-name: label-verifying; }
    .label-solved { animation-name: label-solved; }

    @keyframes widget-scale {
      0%, 13.3333% { transform: scale(1); }
      14.6667% { transform: scale(0.985); }
      16%, 100% { transform: scale(1); }
    }

    @keyframes idle-box-opacity {
      0%, 14.6666% { opacity: 1; }
      14.6667%, 99.999% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes verifying-ring-opacity {
      0%, 14.6666% { opacity: 0; }
      14.6667%, 21.3332% { opacity: 1; }
      21.3333%, 100% { opacity: 0; }
    }

    @keyframes ring-progress {
      0%, 14.6666% { stroke-dashoffset: 87.9646; }
      21.3333%, 99.999% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 87.9646; }
    }

    @keyframes final-check-opacity {
      0%, 21.3332% { opacity: 0; }
      21.3333%, 99.999% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes check-draw {
      0%, 21.3332% { stroke-dashoffset: 100; }
      23.6%, 99.999% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 100; }
    }

    @keyframes label-initial {
      0%, 14.6666% {
        opacity: 1;
        transform: translateY(0);
      }
      15.8%, 98.1999% {
        opacity: 0;
        transform: translateY(-20px);
      }
      98.2% {
        opacity: 0;
        transform: translateY(20px);
      }
      99.3333%, 100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes label-verifying {
      0%, 15.1332% {
        opacity: 0;
        transform: translateY(20px);
      }
      16.2667%, 21.3332% {
        opacity: 1;
        transform: translateY(0);
      }
      22.3333%, 100% {
        opacity: 0;
        transform: translateY(-20px);
      }
    }

    @keyframes label-solved {
      0%, 21.7999% {
        opacity: 0;
        transform: translateY(20px);
      }
      22.9333%, 97.7333% {
        opacity: 1;
        transform: translateY(0);
      }
      98.8667%, 100% {
        opacity: 0;
        transform: translateY(-20px);
      }
    }
  </style>

  <g transform="translate(289 65)">
    <g class="widget-scale">
      <g transform="translate(-289 -65)">
        <rect width="578" height="130" rx="33" fill="#FDFDFD"/>
        <rect
          x="0.75"
          y="0.75"
          width="576.5"
          height="128.5"
          rx="32.25"
          fill="none"
          stroke="#DDDDDD"
          stroke-opacity="0.560784"
          stroke-width="1.5"
        />

        <text class="ui-text brand" x="502" y="87.5439">Cap</text>
        <rect x="501" y="92" width="50" height="2" fill="#212121"/>

        <g transform="translate(61.5 64.5)">
          <g class="idle-box">
            <rect
              x="-26.5"
              y="-26.5"
              width="53"
              height="53"
              rx="12"
              fill="none"
              stroke="#AAAAAA"
              stroke-opacity="0.819608"
              stroke-width="2"
            />
          </g>

          <g class="verifying-ring">
            <g transform="scale(1.72) rotate(-90)">
              <circle
                cx="0"
                cy="0"
                r="14"
                fill="none"
                stroke="#eee"
                stroke-width="3"
              />
              <circle
                class="ring-progress"
                cx="0"
                cy="0"
                r="14"
                fill="none"
                stroke="currentColor"
                stroke-width="3"
                stroke-linecap="round"
                stroke-dasharray="87.9646"
                stroke-dashoffset="87.9646"
              />
            </g>
          </g>

          <g class="final-check">
            <path
              d="M-16.043 0.001L-4.5846 11.46L18.332 -11.457"
              fill="none"
              stroke="#00A67D"
              stroke-width="4.58333"
              stroke-linecap="round"
              stroke-linejoin="round"
              pathLength="100"
              stroke-dasharray="100"
              stroke-dashoffset="100"
            />
          </g>
        </g>

        <g class="ui-text label" mask="url(#label-mask)">
          <g class="label-initial">
            <text x="123" y="77.6875">Verify you’re human</text>
          </g>

          <g class="label-verifying">
            <text x="123" y="77.6875">Verifying...</text>
          </g>

          <g class="label-solved">
            <text x="123" y="77.6875">You’re a human</text>
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>