<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cap</title>
    <link rel="icon" href="./public/logo-small.webp" />
    <style>
      * {
        box-sizing: border-box;
        font-family:
          "IBM Plex Sans",
          system-ui,
          -apple-system,
          sans-serif;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d1016;
        --surface: #0e1015;
        --border: #1f2127;
        --text: #fafafa;
        --text-secondary: #a0a0a8;
        --text-muted: #5c6773;
        --blue: #89b4fa;
      }

      a {
        text-underline-offset: 2px;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-font-smoothing: antialiased;
      }

      .login-container {
        width: 100%;
        margin: 0 auto;
        max-width: 446px;
        padding: 40px;
        align-items: center;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .info-side h1 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 12px;
      }

      .info-side p {
        font-size: 14px;
        color: var(--text-secondary);
        line-height: 1.7;
      }

      .info-side a {
        color: var(--text);
        text-decoration: underline;
        font-size: inherit;
      }

      .info-side a:hover {
        color: var(--blue);
      }

      form {
        display: flex;
        flex-direction: column;
        width: 100%;
      }

      label {
        font-size: 13px;
        font-weight: 500;
        display: block;
        margin-bottom: 8px;
        color: var(--text-secondary);
        user-select: none;
      }

      .password-wrapper {
        border: 1px solid var(--border);
        color: #eee;
        display: flex;
        border-radius: 8px;
        margin-bottom: 16px;
      }

      .showhide-password {
        border: none;
        cursor: pointer;
        background-color: transparent;
        padding: 0;
        margin-right: 10px;
        color: var(--text-muted);
      }

      .password {
        font-size: 24px;
        line-height: 1.33;
        background-color: transparent;
        border: none;
        width: 100%;
        padding: 12px;
        height: 40px;
        color: inherit;
        font-weight: 400;
        caret-color: var(--blue);
      }

      .password.show-password {
        letter-spacing: 0px;
        font-size: 14px;
      }

      .password:focus {
        outline: none;
      }

      .password::placeholder {
        color: rgba(186, 194, 222, 0.4);
        user-select: none;
      }

      .password-wrapper:focus-within {
        border-color: var(--blue);
        box-shadow: 0 0 0 1px var(--blue);
        transition:
          border-color 0.12s,
          box-shadow 0.12s;
      }

      .submit {
        padding: 6px 10px;
        border-radius: 8px;
        height: 40px;
        display: flex;
        align-items: center;
        gap: 6px;
        justify-content: center;
        font-weight: 500;
        border: none;
        color: black;
        background: var(--blue);
        user-select: none;
        cursor: pointer;
        font-size: 14px;
        font-family: inherit;
        transition: opacity 0.15s;
      }

      .submit:hover {
        opacity: 0.88;
      }

      .submit:focus {
        box-shadow: 0 0 0 3px rgba(137, 180, 250, 0.4);
        outline: 0;
      }

      .submit:disabled {
        cursor: not-allowed;
        opacity: 0.4;
      }

      p.err {
        background-color: rgba(137, 180, 250, 0.15);
        color: rgb(228 238 255);
        display: none;
        margin-top: -10px;
        padding: 4px;
        padding-top: 18px;
        padding-bottom: 8px;
        font-size: 13px;
        border-bottom-left-radius: 8px;
        border-bottom-right-radius: 8px;
        text-align: center;
        user-select: none;
      }

      p.bottom {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-top: 20px;
      }

      p.bottom .poweredby {
        margin-left: auto;
      }

      a {
        color: var(--text-muted);
        font-size: 13px;
        text-decoration: none;
        user-select: none;
        transition: color 0.15s;
      }

      a:hover {
        color: var(--text-secondary);
        text-decoration: underline;
      }

      @font-face {
        font-family: "IBM Plex Sans";
        src: url("/public/assets/ibm-plex-sans.woff2") format("woff2");
        font-weight: 100 700;
        font-style: normal;
        font-display: swap;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="info-side">
        <h1>The self-hosted CAPTCHA for the modern web.</h1>
      </div>

      <form action="javascript:void(0)">
        <label>Admin key</label>
        <div class="password-wrapper">
          <input
            type="password"
            name="password"
            placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;"
            class="password"
          />
          <button title="Show/hide password" class="showhide-password" type="button">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"
              />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>

        <button type="submit" class="submit">Continue to Cap</button>
        <p class="err"></p>
        <p class="bottom">
          <a href="https://github.com/tiagozip/cap/issues/new/choose" target="_blank" rel="noopener"
            >Report issues</a
          >
          <a href="https://capjs.js.org/" target="_blank" class="poweredby">Powered by Cap</a>
        </p>
      </form>
    </div>
  </body>
  <script>
    document.querySelector("input").focus();

    document.querySelector("form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const admin_key = document.querySelector("input[name=password]").value;

      if (!admin_key) {
        document.querySelector("input[name=password]").focus();
        return;
      }

      document.querySelector("button[type=submit]").disabled = true;

      const { success, session_token, hashed_token, expires } = await (
        await fetch("/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            admin_key,
          }),
        })
      ).json();

      if (success && session_token) {
        localStorage.setItem(
          "cap_auth",
          JSON.stringify({
            token: session_token,
            expires,
            hash: hashed_token,
          }),
        );

        document.querySelector("p.err").style.display = "none";
        location.reload();
        return;
      }

      document.querySelector("button[type=submit]").disabled = false;
      document.querySelector("p.err").style.display = "block";
      document.querySelector("p.err").innerText = "Incorrect admin key";
      document.querySelector("input[name=password]").value = "";
    });

    document.querySelector(".showhide-password").addEventListener("click", () => {
      const passwordInput = document.querySelector("input[name=password]");
      const showhideButton = document.querySelector(".showhide-password");
      passwordInput.classList.toggle("show-password");

      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        passwordInput.placeholder = "correct horse battery staple";
        showhideButton.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>`;
      } else {
        passwordInput.type = "password";
        passwordInput.placeholder =
          "\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022";
        showhideButton.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>`;
      }
    });
  </script>
</html>
