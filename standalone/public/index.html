<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./public/logo-small.webp" />
    <title>Cap Standalone</title>
    <link rel="stylesheet" href="./public/assets/style.css" />
  </head>
  <body>
    <div class="app">
      <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="appSidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M4 8h16M4 16h16"/></svg>
      </button>
      <div class="mobile-drawer-backdrop" id="mobileDrawerBackdrop" hidden></div>
      <aside class="sidebar" id="appSidebar">
        <div class="sidebar-search">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input type="text" id="searchInput" placeholder="Search keys..." />
        </div>
        <div class="keys-list" id="keysList"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-loader-2" style="margin-top: 1em;margin-bottom: 1em;"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M12 3a9 9 0 1 0 9 9" /></svg></div>
        <div class="sidebar-footer">
          <button class="new-key-btn" id="createKeyBtn">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <path d="M12 5v14M5 12h14" />
            </svg>
            New key
          </button>
          <button class="settings-btn" id="settingsBtn">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37 1 .608 2.296.07 2.572-1.065"
              />
              <circle cx="12" cy="12" r="3" />
            </svg>
            Settings
          </button>
        </div>
      </aside>

      <div class="content-area" id="detailPanel">
        <div class="welcome-screen" id="welcomeScreen">
          <h2>Add Cap to your site in 60 seconds</h2>
          <p class="welcome-sub">Create a sitekey, paste two snippets, you're live.</p>
          <button type="button" class="welcome-cta" id="welcomeCreateKey">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="16" height="16"><path d="M12 5v14M5 12h14" /></svg>
            Create your first key
          </button>
          <p class="welcome-steps"><span>1. Name your key</span><span class="welcome-step-dot">·</span><span>2. Copy the snippets</span><span class="welcome-step-dot">·</span><span>3. Ship</span></p>
          <a class="welcome-docs" href="https://trycap.dev/guide/" target="_blank" rel="noreferrer">Read the docs →</a>
        </div>

        <div class="key-detail" id="keyDetail" style="display: none"></div>
      </div>
    </div>

    <script src="./public/assets/chart.js@4.5.0.min.js"></script>
    <script src="./public/js/dashboard.js"></script>
  </body>
</html>
